# Default values for cbom-repository.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

global:
  replicaCount: 1
  image:
    registry: ""
    repository: ""
    # array of secret names
    pullSecrets: []
  trusted:
    certificates: ""
  httpProxy: ""
  httpsProxy: ""
  noProxy: ""
  # additional init containers that will be added to each pod
  # - name: some-image
  #   image: some-image
  #   imagePullPolicy: IfNotPresent
  #   securityContext:
  #     runAsNonRoot: true
  #   ports:
  #     - name: port
  #       containerPort: "{{ $.Values.container.port }}"
  initContainers: []
  # additional sidecar containers that will be added to each pod
  # see the sample of init containers above
  sidecarContainers: []
  # additional volumes that will be added to each pod
  # - name: additional-volume
  #   configMap:
  #     name: additional-volume
  additionalVolumes: []
  # additional volume mounts that will be added to each pod
  # - name: additional-volume
  #   mountPath: /opt/app
  #   readOnly: true
  additionalVolumeMounts: []
  # additional service ports that will be added to each pod
  # - name: other-port
  #   port: 8080
  #   targetPort: 8080
  additionalPorts: []
  # additional environment variables that will be added to each pod
  additionalEnv:
    # - name: SOME_ENV
    #   value: "some-value"
    variables: []
    # list of config maps to be added as environment variables
    configMaps: []
    # list of secrets to be added as environment variables
    secrets: []

trusted:
  certificates: ""

httpProxy: ""
httpsProxy: ""
noProxy: ""

replicaCount: 1

image:
  # default registry name
  registry: docker.io
  # kept on czertainly until the image is published under omnitrustilm (see #122)
  repository: czertainly
  name: cbom-repository
  tag: 1.0.0
  # the digest to be used instead of the tag
  digest: ""
  pullPolicy: IfNotPresent
  # array of secret names
  pullSecrets: []
  # custom command and args
  command: []
  args: []
  # default security context
  securityContext:
    runAsNonRoot: true
    # runAsUser: 10001
    readOnlyRootFilesystem: true
  # probes configuration
  probes:
    liveness:
      enabled: false
      # custom probe command, will override the default one
      custom: {}
      initialDelaySeconds: 20
      timeoutSeconds: 5
      periodSeconds: 10
      successThreshold: 1
      failureThreshold: 3
    readiness:
      enabled: true
      # custom probe command, will override the default one
      custom: {}
      initialDelaySeconds: 20
      timeoutSeconds: 5
      periodSeconds: 10
      successThreshold: 1
      failureThreshold: 3
    startup:
      enabled: true
      # custom probe command, will override the default one
      custom: {}
      initialDelaySeconds: 15
      timeoutSeconds: 5
      periodSeconds: 10
      successThreshold: 1
      failureThreshold: 45
  resources: {}
    # We follow recommendations and general guidelines to manage resources from:
    # https://master.sdk.operatorframework.io/docs/best-practices/managing-resources/
    # We recommend default requests for CPU and Memory, leaving the limits as a conscious
    # choice for the user. If you do want to specify your own resources, uncomment the following
    # lines, adjust them as necessary, and remove the curly braces after 'resources'.
    # requests:
    #   cpu: 30m
    #   memory: 40M
    # limits: {}

curl:
  image:
    # default registry name
    registry: docker.io
    # kept on czertainly until the image is published under omnitrustilm (see #122)
    repository: czertainly
    name: czertainly-curl
    tag: 8.16.0
    # the digest to be used instead of the tag
    digest: ""
    pullPolicy: IfNotPresent
    # array of secret names
    pullSecrets: []
    # custom command and args
    command: []
    args: []
    # default security context
    securityContext:
      runAsNonRoot: true
      # runAsUser: 100
      readOnlyRootFilesystem: true
    # it does not make sense to have probes for curl
    resources: {}
      # We follow recommendations and general guidelines to manage resources from:
      # https://master.sdk.operatorframework.io/docs/best-practices/managing-resources/
      # We recommend default requests for CPU and Memory, leaving the limits as a conscious
      # choice for the user. If you do want to specify your own resources, uncomment the following
      # lines, adjust them as necessary, and remove the curly braces after 'resources'.
      # requests:
      #   cpu: 50m
      #   memory: 150M
      # limits: {}

# customization of the chart
initContainers: []
sidecarContainers: []
additionalVolumes: []
additionalVolumeMounts: []
additionalPorts: []
additionalEnv:
  variables: []
  configMaps: []
  secrets: []

logging:
  # possible values are: INFO, DEBUG, WARN, ERROR
  level: "INFO"

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podLabels: {}

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

service:
  type: ClusterIP
  port: 8080

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

cbomRepo:
  # Only "s3" is supported by this chart right now (MinIO uses the S3 API).
  endpoint: "http://minio-service:9000"
  region: "eu-west-1"
  bucket: "cbom-repo"
  usePathStyle: true
  accessKey: "minioadmin"
  secretKey: "minioadmin"

minio:
  enabled: false

  image:
    # default registry name
    registry: docker.io
    # minio is discontinued; kept on czertainly pending an S3-compatible alternative (see #121)
    repository: czertainly
    name: czertainly-minio
    tag: RELEASE.2025-09-07T16-13-09Z
    # the digest to be used instead of the tag
    digest: ""
    pullPolicy: IfNotPresent
    # array of secret names
    pullSecrets: []
    # custom command and args
    command: []
    args: []
    # default security context
    securityContext:
      runAsNonRoot: true
      # runAsUser: 1000
      readOnlyRootFilesystem: true
    # probes configuration
    probes:
      liveness:
        enabled: false
        # custom probe command, will override the default one
        custom: {}
        initialDelaySeconds: 20
        timeoutSeconds: 5
        periodSeconds: 10
        successThreshold: 1
        failureThreshold: 3
      readiness:
        enabled: true
        # custom probe command, will override the default one
        custom: {}
        initialDelaySeconds: 20
        timeoutSeconds: 5
        periodSeconds: 10
        successThreshold: 1
        failureThreshold: 3
      startup:
        enabled: true
        # custom probe command, will override the default one
        custom: {}
        initialDelaySeconds: 15
        timeoutSeconds: 5
        periodSeconds: 10
        successThreshold: 1
        failureThreshold: 45
    resources: {}
      # We follow recommendations and general guidelines to manage resources from:
      # https://master.sdk.operatorframework.io/docs/best-practices/managing-resources/
      # We recommend default requests for CPU and Memory, leaving the limits as a conscious
      # choice for the user. If you do want to specify your own resources, uncomment the following
      # lines, adjust them as necessary, and remove the curly braces after 'resources'.
      # requests:
      #   cpu: 30m
      #   memory: 40M
      # limits: {}

  additionalEnv:
    variables: []
    configMaps: []
    secrets: []

  rootUser: "minioadmin"
  rootPassword: "minioadmin"

  service:
    type: ClusterIP
    apiPort: 9000
    consolePort: 9001

  console:
    enabled: true
    redirectUrl: "https://omnitrust.local/minio"

  # persistence parameters
  persistence:
    enabled: true
    storageClassName: ""
    selector: {}
    accessModes:
      - ReadWriteOnce
    existingClaim: ""
    size: 10Gi
    annotations: {}
