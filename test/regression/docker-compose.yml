name: cbom-regression

# Self-contained local regression environment for cbom-repository:
#   minio (S3 backend) + bucket "czert" + cbom-repository built from the
#   current working tree (branch under test). App on http://localhost:8080/api.
services:
  minio-s3:
    # pinned by digest for reproducible regression runs (minio/minio:latest as of 2026-07-23)
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    container_name: cbom-reg-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /tmp --console-address ":9001"

  createbuckets:
    # pinned by digest for reproducible regression runs (minio/mc:latest as of 2026-07-23)
    image: minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    container_name: cbom-reg-mc
    depends_on:
      - minio-s3
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set m http://minio-s3:9000 minioadmin minioadmin; do
        echo 'waiting for minio...'; sleep 1;
      done;
      /usr/bin/mc mb -p m/czert;
      exit 0;
      "

  cbom-repository:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: cbom-reg-app
    depends_on:
      createbuckets:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      APP_S3_REGION: us-east-1
      APP_S3_ENDPOINT: http://minio-s3:9000
      APP_S3_BUCKET: czert
      APP_S3_ACCESS_KEY: minioadmin
      APP_S3_SECRET_KEY: minioadmin
      APP_S3_USE_PATH_STYLE: "true"
      APP_HTTP_PORT: "8080"
      APP_HTTP_PREFIX: /api
      APP_HTTP_MAX_BODY_SIZE: "20971520"
      APP_LOG_LEVEL: DEBUG
