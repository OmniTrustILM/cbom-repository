name: Sonar
on:
  workflow_dispatch:
    inputs:
      pr_number:   { description: "PR number", required: true }
      head_sha:    { description: "Head commit SHA", required: true }
      head_repo:   { description: "Fork repo full_name", required: true }
      head_branch: { description: "Fork branch", required: true }
      base_ref:    { description: "Base branch", required: true }
      run_id:      { description: "Upstream run ID", required: true }

# What appears in the Actions list
run-name: >-
  Sonar • PR #${{ inputs.pr_number }}
  • ${{ inputs.head_repo }}@${{ inputs.head_branch }}
  • ${{ inputs.head_sha }}

permissions:
  contents: read
  checks: write
  pull-requests: read

jobs:
  sonar:
    name: Sonar • PR #${{ inputs.pr_number }}
    runs-on: ubuntu-latest

    steps:
      # Workflow inputs originate from a fork PR and are user-controlled.
      # Pass them via env vars so the shell treats them as data, never as
      # interpolated code, when writing to $GITHUB_ENV.
      - name: Export context
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          HEAD_SHA: ${{ inputs.head_sha }}
          HEAD_REPO: ${{ inputs.head_repo }}
          PR_BRANCH: ${{ inputs.head_branch }}
          BASE_BRANCH: ${{ inputs.base_ref }}
          UPSTREAM_RUN_ID: ${{ inputs.run_id }}
        run: |
          {
            echo "PR_NUMBER=$PR_NUMBER"
            echo "HEAD_SHA=$HEAD_SHA"
            echo "HEAD_REPO=$HEAD_REPO"
            echo "PR_BRANCH=$PR_BRANCH"
            echo "BASE_BRANCH=$BASE_BRANCH"
            echo "UPSTREAM_RUN_ID=$UPSTREAM_RUN_ID"
          } >> "$GITHUB_ENV"

      - name: Generate token
        id: app_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.SONAR_GH_APP_ID }}
          private-key: ${{ secrets.SONAR_GH_APP_PRIVATE_KEY }}

      - name: Create GitHub Check (in_progress)
        id: create_check
        uses: actions/github-script@v9
        with:
          github-token: ${{ steps.app_token.outputs.token }}
          script: |
            const check = await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: `SonarQube Analysis`,
              head_sha: process.env.HEAD_SHA,
              status: "in_progress"
            });
            core.setOutput("check_id", check.data.id);

      # Checkout fork PR branch + fetch base to compute diff
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: ${{ env.HEAD_REPO }}
          ref: ${{ env.PR_BRANCH }}
          fetch-depth: 0

      - name: Fetch base branch
        run: |
          git remote add upstream ${{ github.event.repository.clone_url }}
          git fetch upstream $BASE_BRANCH
          git checkout -B "$BASE_BRANCH" "upstream/$BASE_BRANCH"
          git checkout "$PR_BRANCH"
          git clean -ffdx && git reset --hard HEAD

      - name: Download coverage report artifact from upstream run
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: coverage-report
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.run_id }}
          path: .

      - name: Download golangci-lint report artifact from upstream run
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: golangci-lint-report
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.run_id }}
          path: .

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@c7ee0f9df90b7aa20e8dcf9695dcfe2e7da5b4f2 # v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.scm.revision=${{ env.HEAD_SHA }}
            -Dsonar.pullrequest.key=${{ env.PR_NUMBER }}
            -Dsonar.pullrequest.branch=${{ env.PR_BRANCH }}
            -Dsonar.pullrequest.base=${{ env.BASE_BRANCH }}

      - name: Finalize GitHub Check
        if: always()
        uses: actions/github-script@v9
        with:
          github-token: ${{ steps.app_token.outputs.token }}
          script: |
            const checkId = "${{ steps.create_check.outputs.check_id }}";
            const status = "${{ job.status }}";
            const conclusions = { success: "success", failure: "failure", cancelled: "cancelled" };
            const conclusion = conclusions[status] || "failure";
            await github.rest.checks.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              check_run_id: checkId,
              completed_at: new Date().toISOString(),
              status: "completed",
              conclusion,
              output: {
                title: "SonarQube Analysis Result",
                summary: `✅ SonarQube analysis concluded with status: **${conclusion}**`,
              }
            });
